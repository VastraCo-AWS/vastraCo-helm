{{/*
Generate ServiceAccounts ONLY for services where serviceAccount.create=true AND irsa.enabled=true.
Frontend is explicitly excluded — it runs under the namespace default ServiceAccount.
SA names must match Terraform IRSA trust policy: system:serviceaccount:production:<sa-name>
*/}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.serviceAccount.create $svc.irsa.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $svc.serviceAccount.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: microservice
    {{- include "vastraco.labels" $ | nindent 4 }}
  annotations:
    # IRSA annotation links this SA to the IAM role via OIDC — do not change the role ARN format
    eks.amazonaws.com/role-arn: {{ $svc.irsa.roleArn | quote }}
{{- end }}
{{- end }}
