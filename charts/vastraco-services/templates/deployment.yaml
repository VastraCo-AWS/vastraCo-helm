{{/*
Single Deployment template iterating over all services.
Per-service env var mappings are explicit because each service uses different
DB prefix names (USER_DB_*, PRODUCT_DB_*, ORDER_DB_*) that cannot be genericised.
Secrets are mounted via CSI Driver volume then synced to k8s Secret objects by SecretProviderClass.
*/}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    app.kubernetes.io/component: microservice
    {{- include "vastraco.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/component: microservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
        app.kubernetes.io/component: microservice
    spec:
      {{- if and $svc.serviceAccount.create $svc.irsa.enabled }}
      serviceAccountName: {{ $svc.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- if eq $name "frontend" }}
        # nginx:alpine runs as UID 101 (nginx user) — cannot use runAsUser: 1000
        runAsNonRoot: false
        runAsUser: 101
        {{- else }}
        runAsNonRoot: true
        runAsUser: 1000
        {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # readOnlyRootFilesystem disabled: nginx writes tmp files; Node may write to node_modules
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: {{ $svc.livenessProbe.httpGet.path }}
              port: {{ $svc.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ $svc.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.livenessProbe.periodSeconds }}
            {{- if $svc.livenessProbe.failureThreshold }}
            failureThreshold: {{ $svc.livenessProbe.failureThreshold }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.readinessProbe.httpGet.path }}
              port: {{ $svc.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ $svc.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.readinessProbe.periodSeconds }}
            {{- if $svc.readinessProbe.failureThreshold }}
            failureThreshold: {{ $svc.readinessProbe.failureThreshold }}
            {{- end }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu }}
              memory: {{ $svc.resources.requests.memory }}
            limits:
              cpu: {{ $svc.resources.limits.cpu }}
              memory: {{ $svc.resources.limits.memory }}
          env:
            {{- if $svc.configMap }}
            # Non-secret env vars from ConfigMap
            {{- range $key, $val := $svc.configMap }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $name }}-config
                  key: {{ $key }}
            {{- end }}
            {{- end }}

            {{- if $svc.secretProviderClass }}
            {{- if eq $name "user-service" }}
            # user-service secret env vars — prefix: USER_DB_*
            - name: USER_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DB_HOST
            - name: USER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DB_USERNAME
            - name: USER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: JWT_SECRET
            {{- end }}

            {{- if eq $name "product-service" }}
            # product-service secret env vars — prefix: PRODUCT_DB_*
            - name: PRODUCT_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_HOST
            - name: PRODUCT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_USERNAME
            - name: PRODUCT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: JWT_SECRET
            {{- end }}

            {{- if eq $name "order-service" }}
            # order-service secret env vars — prefix: ORDER_DB_*
            - name: ORDER_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: DB_HOST
            - name: ORDER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: DB_USERNAME
            - name: ORDER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: JWT_SECRET
            {{- end }}

            {{- if eq $name "ai-service" }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: JWT_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: GROQ_API_KEY
            - name: GROQ_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: GROQ_MODEL
            {{- end }}
            {{- end }}

            {{- if $svc.env }}
            {{- toYaml $svc.env | nindent 12 }}
            {{- end }}

          {{- if or $svc.secretProviderClass (eq $name "frontend") }}
          volumeMounts:
            {{- if $svc.secretProviderClass }}
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            {{- end }}
            {{- if eq $name "frontend" }}
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            {{- end }}
          {{- end }}

      {{- if or $svc.secretProviderClass (eq $name "frontend") }}
      volumes:
        {{- if $svc.secretProviderClass }}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ $svc.secretProviderClass }}
        {{- end }}
        {{- if eq $name "frontend" }}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        {{- end }}
      {{- end }}
{{- end }}
{{- end }}
