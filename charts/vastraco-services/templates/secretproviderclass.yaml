---
# ai-service needs JWT_SECRET + Groq credentials from Secrets Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-service-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: ai-service
    {{- include "vastraco.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "vastraco/jwt-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: jwt_secret
            objectAlias: JWT_SECRET
      - objectName: "vastraco/app-secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: groq_api_key
            objectAlias: GROQ_API_KEY
          - path: groq_model
            objectAlias: GROQ_MODEL
  secretObjects:
    - secretName: ai-service-secret
      type: Opaque
      data:
        - objectName: JWT_SECRET
          key: JWT_SECRET
        - objectName: GROQ_API_KEY
          key: GROQ_API_KEY
        - objectName: GROQ_MODEL
          key: GROQ_MODEL
