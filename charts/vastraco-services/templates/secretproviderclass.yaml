# SecretProviderClass resources pull secrets from AWS Secrets Manager via the CSI Driver.
# One per service so each can define its own k8s Secret name and key mappings.
# The CSI volume mount triggers secret sync; the secretObjects block creates the k8s Secret
# that Deployment env vars reference.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: user-service-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: user-service
    {{- include "vastraco.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "vastraco/db-creds"
        objectType: "secretsmanager"
        jmesPath:
          - path: host
            objectAlias: DB_HOST
          - path: username
            objectAlias: DB_USERNAME
          - path: password
            objectAlias: DB_PASSWORD
      - objectName: "vastraco/jwt-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: jwt_secret
            objectAlias: JWT_SECRET
  secretObjects:
    - secretName: user-service-secret
      type: Opaque
      data:
        - objectName: DB_HOST
          key: DB_HOST
        - objectName: DB_USERNAME
          key: DB_USERNAME
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: JWT_SECRET
          key: JWT_SECRET
