# Route order matters — most specific path prefixes first; catch-all frontend last.
# No path rewrites needed: all backend services listen at their actual /api/* paths.
# The React SPA uses relative /api/* paths, so the browser sends them to KGateway directly.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vastraco-routes
  namespace: production
spec:
  parentRefs:
    - name: vastraco-gateway
      namespace: production
  rules:
    # /api/auth → user-service:3001
    # user-service mounts routes at /api/auth (not /api/users)
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: user-service
          port: 3001

    # /api/orders → order-service:3003
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order-service
          port: 3003

    # /api/categories → product-service:3002
    # Must appear before /api/products to avoid shadowing
    - matches:
        - path:
            type: PathPrefix
            value: /api/categories
      backendRefs:
        - name: product-service
          port: 3002

    # /api/products → product-service:3002
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: product-service
          port: 3002

    # /api/ai → ai-service:3004
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: ai-service
          port: 3004

    # Catch-all → frontend:80 (must be last)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
